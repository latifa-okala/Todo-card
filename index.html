 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Todo Card</title>
<link rel="stylesheet" href="todo.css">
</head>

<body>

<article class="todo-card" data-testid="test-todo-card">

<div class="todo-header">

<label>
<input 
 type="checkbox" 
 id="todoCheckbox"
 data-testid="test-todo-complete-toggle"
 aria-label="Mark task as complete"
>
</label>

<div>
<h2 
 class="todo-title" 
 data-testid="test-todo-title"
 id="todoTitle"
>
Finish UI Design
</h2>

<span 
 class="badge priority-high" 
 data-testid="test-todo-priority"
 aria-label="High Priority"
>
High
</span>

</div>

</div>

<p 
 class="todo-description" 
 data-testid="test-todo-description"
>
complete figma design for AI assistant tool.
</p>

<div class="meta">

<time 
 data-testid="test-todo-due-date"
 datetime="2026-04-15T23:59:00"
 id="dueDate"
>
Due April 15th, 2026 11:59PM
</time>

<time 
 data-testid="test-todo-time-remaining"
 id="timeRemaining"
 aria-live="polite"
>
Calculating...
</time>

<span 
 class="status" 
 data-testid="test-todo-status"
 id="status"
>
Pending
</span>

</div>

<ul 
 class="tags" 
 data-testid="test-todo-tags"
 role="list"
>

<li 
 class="tag" 
 data-testid="test-todo-tag-work"
>
Work
</li>

<li 
 class="tag" 
 data-testid="test-todo-tag-urgent"
>
Urgent
</li>

<li class="tag">
Design
</li>

</ul>

<div class="actions">

<button 
 class="edit" 
 data-testid="test-todo-edit-button"
>
Edit
</button>

<button 
 class="delete" 
 data-testid="test-todo-delete-button"
>
Delete
</button>

</div>

</article>

<script>

const checkbox = document.getElementById("todoCheckbox");
const title = document.getElementById("todoTitle");
const status = document.getElementById("status");
const timeRemaining = document.getElementById("timeRemaining");


// Toggle Complete
checkbox.addEventListener("change", () => {

if (checkbox.checked) {

title.classList.add("completed");
status.textContent = "Done";

} else {

title.classList.remove("completed");
status.textContent = "Pending";

}

});


// Time Remaining Logic

const dueDate = new Date("2026-04-15T23:59:00");

function updateTimeRemaining() {

const now = new Date();
const diff = dueDate - now;

const minutes = Math.floor(diff / 60000);
const hours = Math.floor(diff / 3600000);
const days = Math.floor(diff / 86400000);

if (diff <= 0 && Math.abs(minutes) < 1) {

timeRemaining.textContent = "Due now!";

}

else if (diff < 0) {

const overdueHours = Math.abs(hours);

timeRemaining.textContent = `Overdue by ${overdueHours} hours`;

}

else if (days > 1) {

timeRemaining.textContent = `Due in ${days} days`;

}

else if (days === 1) {

timeRemaining.textContent = "Due tomorrow";

}

else {

timeRemaining.textContent = `Due in ${hours} hours`;

}

}

updateTimeRemaining();

setInterval(updateTimeRemaining, 60000);


// Dummy Buttons

document.querySelector(".edit").addEventListener("click", () => {
console.log("edit clicked");
});


document.querySelector(".delete").addEventListener("click", () => {
alert("Delete clicked");
});


</script>

</body>
</html>
